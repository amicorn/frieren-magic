<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archmage: Rune Manifestation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', sans-serif; }
        #ui { position: absolute; top: 8%; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
        h1 { font-size: 3.5rem; margin: 0; letter-spacing: 12px; font-weight: 900; background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #technique-name { font-size: 1.4rem; color: #00ffff; margin-top: 10px; font-weight: bold; letter-spacing: 5px; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 255, 255, 0.7); }

        #video-container {
            position: absolute; bottom: 3%; left: 18%; transform: translateX(-50%) scaleX(-1);
            width: 80vw; max-width: 420px; height: 40vh; 
            border: 4px solid; border-image: linear-gradient(45deg, #f06, #9f6, #06f, #f90) 1;
            z-index: 20; background: #000; border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="ui">
        <h1>SUPREME MANA</h1>
        <div id="technique-name">Ready to Cast...</div>
    </div>
    <div id="video-container">
        <video class="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 60;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const COUNT = 50000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(COUNT * 3);
    const colors = new Float32Array(COUNT * 3);
    const sizes = new Float32Array(COUNT);
    
    const targetPositions = new Float32Array(COUNT * 3);
    const targetColors = new Float32Array(COUNT * 3);
    const targetSizes = new Float32Array(COUNT);

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const particles = new THREE.Points(geometry, new THREE.PointsMaterial({ 
        size: 0.25, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false 
    }));
    scene.add(particles);

    // --- Technique Patterns ---
    const getIcePattern = (i) => {
        const angle = (i / COUNT) * Math.PI * 100;
        const radius = Math.sqrt(i / COUNT) * 45;
        return { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius, z: Math.sin(i)*5, r: 0.5, g: 0.9, b: 1, s: 1.2 };
    };

    const getRunePattern = (i) => {
        const total = COUNT;
        // 40% particles form the base floor (Mandala)
        if (i < total * 0.4) {
            const angle = (i / (total * 0.4)) * Math.PI * 2;
            const r = 30;
            return { x: Math.cos(angle) * r, y: -20, z: Math.sin(angle) * r, r: 1.0, g: 0.8, b: 0.2, s: 0.8 };
        } 
        // 40% particles form vertical Rune Pillars
        else if (i < total * 0.8) {
            const pillarIdx = i % 4;
            const offsets = [{x:15, z:15}, {x:-15, z:15}, {x:15, z:-15}, {x:-15, z:-15}];
            const h = (Math.random() - 0.5) * 60;
            return { 
                x: offsets[pillarIdx].x + (Math.random()-0.5)*2, 
                y: h, 
                z: offsets[pillarIdx].z + (Math.random()-0.5)*2, 
                r: 1.0, g: 0.1, b: 0.5, s: 1.5 
            };
        } 
        // 20% scattered magical dust
        else {
            return { x: (Math.random()-0.5)*80, y: (Math.random()-0.5)*80, z: (Math.random()-0.5)*80, r: 1, g: 1, b: 1, s: 0.5 };
        }
    };

    const getVoidPattern = (i) => {
        const r = 25 + Math.random() * 50;
        const theta = Math.random() * Math.PI * 2;
        return { x: r * Math.cos(theta), y: r * Math.sin(theta), z: (Math.random()-0.5)*20, r: 0.6, g: 0, b: 1, s: 0.8 };
    };

    // --- Hand Tracking ---
    let currentTech = 'neutral';
    let handPos = { x: 0, y: 0 };
    let handVel = { x: 0, y: 0 };
    let lastHandPos = { x: 0, y: 0 };
    let glowColor = '#00ffff';

    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });

    hands.onResults((results) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        let detected = 'neutral';

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const lm = results.multiHandLandmarks[0];
            handPos.x = (0.5 - lm[9].x) * 80;
            handPos.y = (0.5 - lm[9].y) * 60;
            handVel.x = handPos.x - lastHandPos.x;
            handVel.y = handPos.y - lastHandPos.y;
            lastHandPos = { ...handPos };

            results.multiHandLandmarks.forEach(hand => {
                drawConnectors(canvasCtx, hand, HAND_CONNECTIONS, {color: glowColor, lineWidth: 5});
                drawLandmarks(canvasCtx, hand, {color: '#fff', fillColor: glowColor, radius: 3});
            });

            // TEEPEE/RUNE GESTURE LOGIC (Index tips close to each other)
            if (results.multiHandLandmarks.length === 2) {
                const h1 = results.multiHandLandmarks[0];
                const h2 = results.multiHandLandmarks[1];
                const dist = Math.hypot(h1[8].x - h2[8].x, h1[8].y - h2[8].y);
                if (dist < 0.1) detected = 'rune';
            }

            if (detected === 'neutral') {
                const isUp = (t, p) => lm[t].y < lm[p].y;
                const upCount = [8,12,16,20].filter(i => isUp(i, i-2)).length;
                if (upCount === 4) detected = 'ice';
                else if (upCount === 0) detected = 'void';
            }
        }
        updateState(detected);
    });

    function updateState(tech) {
        if(currentTech === tech) return;
        currentTech = tech;
        const nameEl = document.getElementById('technique-name');

        if(tech === 'rune') { glowColor = '#ff0077'; nameEl.innerText = "ELDRITCH RUNE-GATE"; bloomPass.strength = 3.5; }
        else if(tech === 'ice') { glowColor = '#00f2ff'; nameEl.innerText = "CRYSTALLINE FRACTURE"; bloomPass.strength = 2.0; }
        else if(tech === 'void') { glowColor = '#aa00ff'; nameEl.innerText = "ABYSSAL REACH"; bloomPass.strength = 2.5; }
        else { glowColor = '#00ffff'; nameEl.innerText = "Neutralizing..."; bloomPass.strength = 1.0; }

        for(let i=0; i<COUNT; i++) {
            let p;
            if(tech === 'rune') p = getRunePattern(i);
            else if(tech === 'ice') p = getIcePattern(i);
            else if(tech === 'void') p = getVoidPattern(i);
            else p = { x: (Math.random()-0.5)*10, y: (Math.random()-0.5)*10, z: (Math.random()-0.5)*10, r:0.2, g:0.5, b:0.5, s:0.3 };
            
            targetPositions[i*3] = p.x; targetPositions[i*3+1] = p.y; targetPositions[i*3+2] = p.z;
            targetColors[i*3] = p.r; targetColors[i*3+1] = p.g; targetColors[i*3+2] = p.b;
            targetSizes[i] = p.s;
        }
    }

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            await hands.send({image: videoElement});
        }, width: 640, height: 480
    });
    cameraUtils.start();

    function animate() {
        requestAnimationFrame(animate);
        const pos = particles.geometry.attributes.position.array;
        const col = particles.geometry.attributes.color.array;

        particles.position.x += (handPos.x - particles.position.x) * 0.1;
        particles.position.y += (handPos.y - particles.position.y) * 0.1;
        
        if (currentTech === 'rune') {
            particles.rotation.y += 0.02; // Rotate the gateway
            particles.rotation.x = 0; // Keep it upright
        } else {
            particles.rotation.y += handVel.x * 0.05 + 0.005;
            particles.rotation.x -= handVel.y * 0.05;
        }

        for(let i=0; i<COUNT*3; i++) {
            pos[i] += (targetPositions[i] - pos[i]) * 0.08;
            col[i] += (targetColors[i] - col[i]) * 0.1;
        }

        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;
        composer.render();
    }
    animate();
</script>
</body>
</html>
