<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archmage: Astral Aesthetic</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0d0d0d; font-family: 'Courier New', sans-serif; }
        #ui { position: absolute; top: 8%; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
        h1 { font-size: 3rem; margin: 0; letter-spacing: 12px; font-weight: 900; background: linear-gradient(to right, #ff9a9e, #fad0c4, #a1c4fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        #technique-name { font-size: 1.2rem; color: #ffccff; margin-top: 10px; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 10px #ff00ff; }

        #video-container {
            position: absolute; bottom: 3%; left: 50%; transform: translateX(-50%) scaleX(-1);
            width: 400px; height: 250px; 
            border: 4px solid; border-image: linear-gradient(45deg, #ff9a9e, #a18cd1, #84fab0, #ffecd2) 1;
            z-index: 20; background: #000; border-radius: 30px; overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 182, 193, 0.4);
        }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="ui">
        <h1>ASTRAL WEAVER</h1>
        <div id="technique-name">Harmonizing Dual Energies...</div>
    </div>
    <div id="video-container">
        <video class="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Scene & Sparkling Material ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 70;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.2, 0.5, 0.9);
    composer.addPass(bloom);

    const COUNT = 50000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(COUNT * 3);
    const colors = new Float32Array(COUNT * 3);
    
    // Half for Left Hand (0-24999), Half for Right Hand (25000-49999)
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({ 
        size: 0.35, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.9 
    });
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // --- Pastel Palettes ---
    const PALETTES = {
        'pink': [1, 0.7, 0.8], // Cotton Candy
        'blue': [0.7, 0.9, 1], // Dreamy Blue
        'purple': [0.8, 0.7, 1], // Lavender
        'mint': [0.7, 1, 0.8], // Mint Sparkle
        'gold': [1, 0.9, 0.7]  // Champagne
    };

    let handStates = [
        { x: -30, y: 0, targetX: -30, targetY: 0, velX: 0, velY: 0, color: PALETTES.pink },
        { x: 30, y: 0, targetX: 30, targetY: 0, velX: 0, velY: 0, color: PALETTES.blue }
    ];

    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });

    hands.onResults((res) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        if (res.multiHandLandmarks) {
            res.multiHandLandmarks.forEach((lm, index) => {
                const state = handStates[index] || handStates[0];
                const oldX = state.targetX;
                const oldY = state.targetY;
                
                state.targetX = (0.5 - lm[9].x) * 120;
                state.targetY = (0.5 - lm[9].y) * 80;
                state.velX = state.targetX - oldX;
                state.velY = state.targetY - oldY;

                // Identify Hand Side for Color
                const isRight = res.multiHandedness[index].label === 'Right';
                state.color = isRight ? PALETTES.purple : PALETTES.pink;

                // Draw Sparkling Skeleton
                const glow = `rgba(${state.color[0]*255}, ${state.color[1]*255}, ${state.color[2]*255}, 0.8)`;
                drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, {color: glow, lineWidth: 4});
                drawLandmarks(canvasCtx, lm, {color: '#fff', fillColor: glow, radius: 3});
            });
        }
    });

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            await hands.send({image: videoElement});
        }, width: 640, height: 480
    });
    cameraUtils.start();

    function animate() {
        requestAnimationFrame(animate);
        const pos = particles.geometry.attributes.position.array;
        const col = particles.geometry.attributes.color.array;

        for (let i = 0; i < COUNT; i++) {
            const i3 = i * 3;
            const handIdx = i < COUNT/2 ? 0 : 1;
            const h = handStates[handIdx];

            // Lerp particle positions toward their respective hand
            // Adding a "swirl" and "sparkle" offset
            const time = Date.now() * 0.002;
            const swirlX = Math.cos(time + i) * (5 + Math.sin(i) * 10);
            const swirlY = Math.sin(time + i) * (5 + Math.cos(i) * 10);

            const tx = h.targetX + swirlX + (h.velX * 20 * Math.random());
            const ty = h.targetY + swirlY + (h.velY * 20 * Math.random());
            const tz = Math.sin(time * 0.5 + i) * 10;

            pos[i3] += (tx - pos[i3]) * 0.05;
            pos[i3+1] += (ty - pos[i3+1]) * 0.05;
            pos[i3+2] += (tz - pos[i3+2]) * 0.05;

            // Random sparkle flicker
            const sparkle = Math.random() > 0.98 ? 1.5 : 1.0;
            col[i3] = h.color[0] * sparkle;
            col[i3+1] = h.color[1] * sparkle;
            col[i3+2] = h.color[2] * sparkle;
        }

        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;
        
        // Dynamic Scene Tilt
        particles.rotation.y += 0.003;
        particles.rotation.x = (handStates[0].velY + handStates[1].velY) * 0.1;

        composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
